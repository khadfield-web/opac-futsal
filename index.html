<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPAC Futsal World Championship</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0e17;--surface:#131a2b;--surface-2:#1a2340;--border:#243054;--text:#e4e8f1;--text-muted:#7a8bb5;--accent:#00e676;--accent-dim:rgba(0,230,118,0.12);--accent-glow:rgba(0,230,118,0.25);--orange:#ff9100;--red:#ff5252;--gold:#ffd740;--silver:#b0bec5;--radius:10px;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif;min-height:100vh;padding:24px;}
  h1,h2,h3{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.04em;}
  .container{max-width:1100px;margin:0 auto;}
  .header{text-align:center;padding:24px 0 20px;}
  .header-logo{width:90px;height:90px;border-radius:50%;object-fit:cover;margin-bottom:10px;}
  .header h1{font-size:2.4rem;font-weight:700;background:linear-gradient(135deg,var(--accent),#69f0ae);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:0.04em;}
  .header p{color:var(--text-muted);margin-top:4px;font-size:1rem;letter-spacing:0.08em;text-transform:uppercase;font-family:'Oswald',sans-serif;}
  .live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);margin-right:6px;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  .live-bar{text-align:center;margin-bottom:20px;font-family:'Oswald',sans-serif;font-size:0.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;}
  .tabs{display:flex;gap:4px;margin-bottom:28px;background:var(--surface);border-radius:var(--radius);padding:4px;border:1px solid var(--border);}
  .tab-btn{flex:1;padding:12px 16px;border:none;background:transparent;color:var(--text-muted);font-family:'Oswald',sans-serif;font-size:1rem;text-transform:uppercase;letter-spacing:0.06em;cursor:pointer;border-radius:7px;transition:all 0.2s;}
  .tab-btn:hover{color:var(--text);background:var(--surface-2);}
  .tab-btn.active{background:var(--accent);color:var(--bg);font-weight:600;}
  .tab-content{display:none;}.tab-content.active{display:block;}
  .team-badge{display:inline-flex;align-items:center;gap:6px;}
  .badge-flag{font-size:1.3rem;line-height:1;}
  .badge-img{width:24px;height:24px;border-radius:3px;object-fit:contain;vertical-align:middle;}
  .teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px;}
  .team-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;}
  .team-num{width:32px;height:32px;border-radius:50%;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-weight:600;font-size:0.9rem;flex-shrink:0;}
  .league-table{width:100%;border-collapse:collapse;margin-bottom:24px;}
  .league-table th{background:var(--surface-2);padding:12px 14px;text-align:left;font-family:'Oswald',sans-serif;font-size:0.85rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);border-bottom:2px solid var(--border);}
  .league-table th:first-child{border-radius:var(--radius) 0 0 0;}
  .league-table th:last-child{border-radius:0 var(--radius) 0 0;text-align:center;}
  .league-table td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:0.95rem;}
  .league-table tr:last-child td{border-bottom:none;}
  .league-table tr:nth-child(even){background:rgba(19,26,43,0.5);}
  .league-table .pos{font-family:'Oswald',sans-serif;font-weight:600;width:36px;text-align:center;}
  .league-table .team-name{font-weight:600;}
  .league-table .pts{text-align:center;font-family:'Oswald',sans-serif;font-weight:700;font-size:1.1rem;color:var(--accent);}
  .league-table .num{text-align:center;font-family:'Oswald',sans-serif;}
  .pos-1 .pos{color:var(--gold);}.pos-2 .pos{color:var(--silver);}
  .top-4{background:var(--accent-dim) !important;}
  .week-block{margin-bottom:32px;}
  .week-title{font-family:'Oswald',sans-serif;font-size:1.4rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.04em;padding:4px 0;text-shadow:0 0 20px var(--accent-glow);margin-bottom:12px;}
  .match-row{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:10px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;transition:all 0.3s;}
  .match-row.completed{border-color:var(--accent);box-shadow:0 0 12px var(--accent-dim);}
  .match-row.semi-match{border-color:var(--orange);}.match-row.prelim-match{border-color:var(--silver);}.match-row.final-match{border-color:var(--gold);box-shadow:0 0 20px rgba(255,215,64,0.15);}
  .match-team{font-weight:700;font-size:1.5rem;font-family:'Oswald',sans-serif;}.match-team.right{text-align:right;}
  .match-team.winner{color:var(--accent);text-shadow:0 0 10px var(--accent-glow);}
  .match-scores{display:flex;align-items:center;gap:6px;}
  .score-display{width:48px;height:44px;text-align:center;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:600;display:flex;align-items:center;justify-content:center;}
  .score-display.winner-score{color:var(--accent);border-color:var(--accent);text-shadow:0 0 8px var(--accent-glow);}
  .match-scores .vs{color:var(--text-muted);font-family:'Oswald',sans-serif;font-size:0.8rem;}
  .match-slot{grid-column:1/-1;text-align:center;font-size:0.85rem;color:var(--accent);text-transform:uppercase;font-family:'Oswald',sans-serif;letter-spacing:0.06em;padding:4px 8px;}
  .finals-section{margin-bottom:28px;}
  .finals-banner{text-align:center;padding:24px;border-radius:var(--radius);margin-bottom:16px;overflow:hidden;}
  .finals-banner.semi{background:linear-gradient(135deg,var(--surface),var(--surface-2));border:2px solid var(--orange);}
  .finals-banner.prelim{background:linear-gradient(135deg,var(--surface),var(--surface-2));border:2px solid var(--silver);}
  .finals-banner.grand{background:linear-gradient(135deg,var(--surface),var(--surface-2));border:2px solid var(--gold);}
  .finals-banner.semi h2{color:var(--orange);}.finals-banner.prelim h2{color:var(--silver);}.finals-banner.grand h2{color:var(--gold);}
  .finals-banner h2{font-size:1.5rem;}.finals-banner p{color:var(--text-muted);font-size:0.9rem;margin-top:4px;}
  .winner-banner{text-align:center;padding:24px;background:var(--accent-dim);border:2px solid var(--accent);border-radius:var(--radius);margin-top:20px;}
  .winner-banner h2{color:var(--accent);font-size:1.6rem;}
  .info-box{background:var(--surface);border-left:3px solid var(--orange);padding:14px 18px;border-radius:0 var(--radius) var(--radius) 0;margin-bottom:20px;color:var(--text-muted);font-size:0.9rem;}
  .pen-label{grid-column:1/-1;text-align:center;font-family:'Oswald',sans-serif;font-size:0.8rem;color:var(--gold);text-transform:uppercase;letter-spacing:0.04em;padding:6px 0;border-top:1px dashed var(--gold);margin-top:6px;}
  .confetti-container{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
  .confetti-piece{position:absolute;width:10px;height:10px;top:-20px;animation:confettiFall linear forwards;}
  @keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
  .loading{text-align:center;padding:60px;color:var(--text-muted);font-family:'Oswald',sans-serif;font-size:1.2rem;text-transform:uppercase;}
  @media(max-width:600px){body{padding:12px;}.header h1{font-size:1.6rem;}.match-row{grid-template-columns:1fr;gap:8px;text-align:center;}.match-team.right{text-align:center;}.match-scores{justify-content:center;}.teams-grid{grid-template-columns:1fr;}}
</style>
</head>

    <h1 id="compTitle">OPAC Futsal World Championship</h1>
    <p id="compSub">Wednesday Lunchtime League</p>
  </div>
  <div class="live-bar"><span class="live-dot"></span>Live — Updates every 30 seconds</div>
  <div class="tabs">
    <button class="tab-btn" data-tab="table" onclick="showTab('table',this)">Table</button>
    <button class="tab-btn active" data-tab="fixtures" onclick="showTab('fixtures',this)">Fixtures</button>
    <button class="tab-btn" data-tab="finals" onclick="showTab('finals',this)">Finals</button>

<script>
const FB='https://opac-futsal-world-champi-1017b-default-rtdb.asia-southeast1.firebasedatabase.app';
let state=null,prevChamp='';
function getT(n){if(!state||!state.teams)return{name:n,flag:'',logo:''};return state.teams.find(t=>t.name===n)||{name:n,flag:'',logo:''};}
function badge(n){const t=getT(n);let h='';if(t.logo)h+=`<img src="${esc(t.logo)}" class="badge-img" onerror="this.style.display='none'"> `;else if(t.flag)h+=`<span class="badge-flag">${t.flag}</span> `;h+=esc(t.name||n);return `<span class="team-badge">${h}</span>`;}
function isComp(m){return m.homeScore!==''&&m.homeScore!==undefined&&m.awayScore!==''&&m.awayScore!==undefined&&!isNaN(parseInt(m.homeScore))&&!isNaN(parseInt(m.awayScore));}
function mWin(m){if(!isComp(m))return null;const h=parseInt(m.homeScore),a=parseInt(m.awayScore);if(h>a)return'home';if(a>h)return'away';return'draw';}

async function poll(){try{const r=await fetch(FB+'/futsal.json');const d=await r.json();if(d&&d.teams){state=d;if(state.teams.length&&typeof state.teams[0]==='string')state.teams=state.teams.map(n=>({name:n,flag:'',logo:''}));if(!state.finals)state.finals={semi1:{},semi2:{},prelim:{},grand:{}};renderAll();}}catch(e){}}
function renderAll(){document.getElementById('compTitle').textContent=state.title||'OPAC Futsal World Championship';document.getElementById('compSub').textContent=state.subtitle||'';renderTeams();renderFix();renderTable();renderFinals();}
function showTab(t,b){document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));document.getElementById('tab-'+t).classList.add('active');if(b)b.classList.add('active');}
function renderTeams(){document.getElementById('teamsGrid').innerHTML=(state.teams||[]).map((t,i)=>`<div class="team-card"><div class="team-num">${i+1}</div>${badge(t.name)}</div>`).join('');}
function renderFix(){
  const c=document.getElementById('fixCon');
  if(!state.weeks||!state.weeks.length){c.innerHTML='<div class="info-box">No fixtures yet. Check back soon!</div>';return;}
  c.innerHTML=state.weeks.map(w=>`<div class="week-block"><div class="week-title">${esc(w.label||'')}</div>
    ${(w.matches||[]).map(m=>{const done=isComp(m),win=mWin(m);
      return `<div class="match-row${done?' completed':''}">
      <div class="match-team${win==='home'?' winner':''}">${badge(m.home)}</div>
      <div class="match-scores"><div class="score-display${win==='home'?' winner-score':''}">${m.homeScore!==''?m.homeScore:'-'}</div><span class="vs">vs</span><div class="score-display${win==='away'?' winner-score':''}">${m.awayScore!==''?m.awayScore:'-'}</div></div>
      <div class="match-team right${win==='away'?' winner':''}">${badge(m.away)}</div>
      <div class="match-slot">${esc(m.slot||'')}</div></div>`;}).join('')}</div>`).join('');
}
function calcTable(){if(!state||!state.teams)return[];const s={};state.teams.forEach(t=>{s[t.name]={played:0,won:0,drawn:0,lost:0,gf:0,ga:0,pts:0};});(state.weeks||[]).forEach(w=>(w.matches||[]).forEach(m=>{if(m.homeScore===''||m.awayScore==='')return;const hs=parseInt(m.homeScore),as=parseInt(m.awayScore);if(isNaN(hs)||isNaN(as)||!s[m.home]||!s[m.away])return;s[m.home].played++;s[m.away].played++;s[m.home].gf+=hs;s[m.home].ga+=as;s[m.away].gf+=as;s[m.away].ga+=hs;if(hs>as){s[m.home].won++;s[m.home].pts+=3;s[m.away].lost++;}else if(hs<as){s[m.away].won++;s[m.away].pts+=3;s[m.home].lost++;}else{s[m.home].drawn++;s[m.home].pts+=1;s[m.away].drawn++;s[m.away].pts+=1;}}));return Object.entries(s).map(([t,v])=>({team:t,...v,gd:v.gf-v.ga})).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);}
function renderTable(){const rows=calcTable(),c=document.getElementById('tableCon');if(!rows.length){c.innerHTML='<div class="info-box">No results yet.</div>';return;}c.innerHTML=`<table class="league-table"><thead><tr><th>#</th><th>Team</th><th class="num">P</th><th class="num">W</th><th class="num">D</th><th class="num">L</th><th class="num">GF</th><th class="num">GA</th><th class="num">GD</th><th>Pts</th></tr></thead><tbody>${rows.map((r,i)=>`<tr class="${i<4?'top-4':''} pos-${i+1}"><td class="pos">${i+1}</td><td class="team-name">${badge(r.team)}</td><td class="num">${r.played}</td><td class="num">${r.won}</td><td class="num">${r.drawn}</td><td class="num">${r.lost}</td><td class="num">${r.gf}</td><td class="num">${r.ga}</td><td class="num">${r.gd>0?'+':''}${r.gd}</td><td class="pts">${r.pts}</td></tr>`).join('')}</tbody></table><div class="info-box">Top 4 (highlighted) qualify for Finals.</div>`;}
function gFW(m){if(!m||m.homeScore===''||m.homeScore===undefined||m.awayScore===''||m.awayScore===undefined)return{w:'TBD',l:'TBD'};const h=parseInt(m.homeScore),a=parseInt(m.awayScore);if(isNaN(h)||isNaN(a))return{w:'TBD',l:'TBD'};if(h!==a)return{w:h>a?m.home:m.away,l:h<a?m.home:m.away};if(m.penWinner)return{w:m.penWinner,l:m.penWinner===m.home?m.away:m.home};return{w:'TBD',l:'TBD',draw:true};}
function renderFinals(){if(!state||!state.finals)return;const rows=calcTable(),c=document.getElementById('finalsCon');if(!rows.some(r=>r.played>0)){c.innerHTML='<div class="info-box">Finals appear once games are played.</div>';return;}const f=state.finals;f.semi1.home=rows[0]?.team||'TBD';f.semi1.away=rows[1]?.team||'TBD';f.semi2.home=rows[2]?.team||'TBD';f.semi2.away=rows[3]?.team||'TBD';const r1=gFW(f.semi1),r2=gFW(f.semi2);f.prelim.home=r1.l;f.prelim.away=r2.w;const rP=gFW(f.prelim);f.grand.home=r1.w;f.grand.away=rP.w;const rG=gFW(f.grand);let wH='';if(rG.w&&rG.w!=='TBD'){wH=`<div class="winner-banner"><h2>🏆 ${badge(rG.w)} Champions! 🏆</h2></div>`;if(prevChamp!==rG.w){prevChamp=rG.w;confetti();}}else{prevChamp='';}c.innerHTML=`${fH('Semi Final 1','semi','1st vs 2nd',f.semi1)}${fH('Semi Final 2','semi','3rd vs 4th',f.semi2)}<div class="info-box">Loser SF1 vs Winner SF2</div>${fH('Preliminary Final','prelim','',f.prelim)}<div class="info-box">Winner SF1 vs Winner Prelim</div>${fH('Grand Final','grand','',f.grand)}${wH}`;}
function fH(title,cls,sub,m){const hs=m.homeScore!==''&&m.homeScore!==undefined?m.homeScore:'-';const as=m.awayScore!==''&&m.awayScore!==undefined?m.awayScore:'-';const done=isComp(m);const win=mWin(m);let pen='';if(done){const h=parseInt(m.homeScore),a=parseInt(m.awayScore);if(h===a)pen=m.penWinner?`<div class="pen-label">⚽ Won on Penalties: ${badge(m.penWinner)}</div>`:`<div class="pen-label">⚽ Drawn — Awaiting Penalties</div>`;}return `<div class="finals-section"><div class="finals-banner ${cls}"><h2>${title}</h2>${sub?`<p>${sub}</p>`:''}</div><div class="match-row ${done?'completed ':' '}${cls==='grand'?'final-match':cls==='semi'?'semi-match':'prelim-match'}"><div class="match-team${win==='home'?' winner':''}">${badge(m.home||'TBD')}</div><div class="match-scores"><div class="score-display${win==='home'?' winner-score':''}">${hs}</div><span class="vs">vs</span><div class="score-display${win==='away'?' winner-score':''}">${as}</div></div><div class="match-team right${win==='away'?' winner':''}">${badge(m.away||'TBD')}</div>${pen}</div></div>`;}
function confetti(){const ex=document.querySelector('.confetti-container');if(ex)ex.remove();const c=document.createElement('div');c.className='confetti-container';document.body.appendChild(c);const cols=['#00e676','#ffd740','#ff9100','#ff5252','#448aff','#e040fb','#69f0ae','#ffab40'];for(let i=0;i<120;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'%';p.style.backgroundColor=cols[Math.floor(Math.random()*cols.length)];p.style.width=(Math.random()*8+6)+'px';p.style.height=(Math.random()*8+6)+'px';p.style.borderRadius=Math.random()>0.5?'50%':'0';p.style.animationDuration=(Math.random()*2+2)+'s';p.style.animationDelay=(Math.random()*3)+'s';c.appendChild(p);}setTimeout(()=>c.remove(),6000);}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
poll();setInterval(poll,30000);
</script>
